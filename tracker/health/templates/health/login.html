{% load static %}
<style>
    body{
        background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("{% static 'images/home.jpg' %}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
    }
    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        background: #333333 !important;
        border: none;
        border-radius: 4px;
        color: white !important;
    }
    .helptext, .errorlist {
        font-size: 11px;
        color: #252424;
        list-style: none;
        padding: 0;
        margin-bottom: 10px;
    }
</style>


<body id="logPage">


<div class="container" style="display:flex; justify-content:center; align-items:center; height:80vh;">
    <div class="card" style="width:350px; padding:50px; color: #ffff;">
    
        <h2 style="color: #000000;">Sign In</h2>
        <div style="border-left: 5px solid #E50914; padding-left: 15px; margin-bottom: 40px;">
    <h1 style="color: white; font-size: 2.2rem; font-weight: 700; margin: 0; letter-spacing: 2px;">
        CALORIE <span style="color: #E50914;">TRACKER</span>
    </h1>
    <p style="color: #666; font-size: 14px; margin: 0;">Log. Track. Conquer.</p>
</div>
        <h2 style="margin-bottom:20px; color: #ffff;">Sign In</h2>

  
        <form method="POST"> {% csrf_token %}
            {{ form.as_p }}
            
            <div style="display:flex; gap:10px; margin-top:20px;">
                <!-- Primary Sign In Button -->
                <button type="submit" class="btn-netflix" style="flex:2; padding:12px;">Sign In</button>
                
                <!-- Secondary Sign Up Button -->
                <a href="{% url 'signup' %}" style="flex:1; background:#333; color:white; text-decoration:none; text-align:center; padding:12px; border-radius:2px; font-weight:bold; font-size:14px; line-height:1.2;">
                    Sign Up
                </a>
            </div>
        </form>
        
        <p style="color:#666; margin-top:20px; font-size:13px;">New to the tracker? Click Sign Up to start.</p>
    </div>
</div>
</body>
