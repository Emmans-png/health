{% load static %}
<style>
    body{
        background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("{% static 'images/auth.jpg' %}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
    }
    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        background: #33333 !important;
        border: none;
        border-radius: 4px;
        color: white !important;
    }
    .helptext, .errorlist {
        font-size: 11px;
        color: #b3b3b3;
        list-style: none;
        padding: 0;
        margin-bottom: 10px;
    }
</style>

<div class="container" style="display:flex; justify-content:center; align-items:center; height:85vh;">
    <div class="card" style="width:400px; padding:60px;">
        <h2 style="margin-bottom:25px; font-weight:bold;">Sign Up</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <!-- Django loops through Username, Password 1, and Password 2 -->
            {{ form.as_p }}
            
            <button type="submit" class="btn-netflix" style="padding:15px; margin-top:10px; font-size:16px;">
                Create Account
            </button>
        </form>
        
        <div style="margin-top:20px; border-top: 1px solid #333; padding-top:20px;">
            <span style="color:#737373;">Already have an account?</span>
            <a href="{% url 'login' %}" style="color:#737373; text-decoration:none; font-weight:bold; margin-left:5px;">
                Sign In now.
            </a>
        </div>
    </div>
</div>
